name: Example - SonarQube to SARIF

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  sonarqube-analysis:
    name: SonarQube Analysis and SARIF Conversion
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      checks: write
      pull-requests: write

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          # Disable Elasticsearch mmap — GitHub-hosted runners have
          # vm.max_map_count=262144, below the 524288 Elasticsearch requires.
          SONAR_SEARCH_JAVAADDITIONALOPTS: "-Dnode.store.allow_mmap=false"
        options: >-
          --ulimit nofile=131072:131072
          --health-cmd "curl -f http://localhost:9000/api/system/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 90s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      # SonarQube 10+ forces a password change before the API accepts requests.
      # We change it here and generate a short-lived analysis token on the fly,
      # so no repository secrets are needed for this workflow.
      - name: Setup SonarQube (change default password and create token)
        id: sonar_setup
        env:
          SONAR_ADMIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Change default admin password (required before API token generation)
          curl -sf -X POST \
            -H "Authorization: Basic $(printf 'admin:admin' | base64 -w0)" \
            "http://localhost:9000/api/users/change_password" \
            -d "login=admin&password=${SONAR_ADMIN_PASSWORD}&previousPassword=admin"

          # Generate a global analysis token for this run
          TOKEN=$(curl -sf -X POST \
            -H "Authorization: Basic $(printf 'admin:%s' "${SONAR_ADMIN_PASSWORD}" | base64 -w0)" \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}&type=GLOBAL_ANALYSIS_TOKEN" \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)

          # Mask the token so it never appears in logs
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ steps.sonar_setup.outputs.token }}
          SONAR_HOST_URL: http://localhost:9000

      # Convert SonarQube issues to SARIF format.
      # The action waits for analysis processing to finish before fetching issues.
      - name: Convert to SARIF
        uses: ./ # Use local action for testing; in production use: vmvarela/sonarqube-sarif@v1
        with:
          sonar-host-url: http://localhost:9000
          sonar-token: ${{ steps.sonar_setup.outputs.token }}
          project-key: sonarqube-sarif
          output-file: sonarqube-results.sarif
          wait-for-processing: "true"

      # Upload SARIF to GitHub Code Scanning (push/dispatch only — not PRs)
      - name: Upload SARIF to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sonarqube-results.sarif
          category: sonarqube

      # Keep the SARIF file as a workflow artifact for inspection
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-results
          path: sonarqube-results.sarif
