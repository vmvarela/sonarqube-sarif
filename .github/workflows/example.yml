name: Example - SonarQube to SARIF

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  sonarqube-analysis:
    name: SonarQube Analysis and SARIF Conversion
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SONAR_SCANNER_VERSION: "8.0.1.6346"
    permissions:
      security-events: write
      contents: read
      checks: write
      pull-requests: write

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          # Disable Elasticsearch mmap — GitHub-hosted runners have
          # vm.max_map_count=262144, below the 524288 Elasticsearch requires.
          SONAR_SEARCH_JAVAADDITIONALOPTS: "-Dnode.store.allow_mmap=false"
        options: >-
          --ulimit nofile=131072:131072

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      # SonarQube 10+ forces a password change before the API accepts requests.
      # We change it here and generate a short-lived analysis token on the fly,
      # so no repository secrets are needed for this workflow.
      #
      # Note: no Docker health check is used on the service container because
      # `curl` is not available inside the sonarqube:community image. Instead
      # we poll the health endpoint from the runner (host) until SonarQube is
      # fully operational (status=GREEN) before proceeding.
      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to become operational..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf -u admin:admin \
              "http://localhost:9000/api/system/health" 2>/dev/null \
              | grep -o '"health":"[^"]*"' | cut -d'"' -f4 || true)
            echo "Attempt ${i}/30 — status: ${STATUS:-unavailable}"
            if [ "${STATUS}" = "GREEN" ]; then
              echo "SonarQube is ready."
              exit 0
            fi
            sleep 10
          done
          echo "SonarQube did not become ready in time."
          exit 1

      - name: Setup SonarQube (change default password and create token)
        id: sonar_setup
        env:
          # Password must satisfy SonarQube complexity rules:
          # min 12 chars, at least 1 uppercase, 1 digit, 1 special character.
          SONAR_ADMIN_PASSWORD: "Ci!Run-${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          # Change default admin password (required before API token generation).
          # Use -w to show HTTP status on failure without suppressing the body.
          HTTP_STATUS=$(curl -s -o /tmp/sq_pw_response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Basic $(printf 'admin:admin' | base64 -w0)" \
            "http://localhost:9000/api/users/change_password" \
            -d "login=admin&password=${SONAR_ADMIN_PASSWORD}&previousPassword=admin")
          if [ "${HTTP_STATUS}" != "200" ] && [ "${HTTP_STATUS}" != "204" ]; then
            echo "Password change failed (HTTP ${HTTP_STATUS}):"
            cat /tmp/sq_pw_response.txt
            exit 1
          fi

          # Generate a user token for this run (USER_TOKEN has read access to issues API)
          TOKEN=$(curl -sf -X POST \
            -H "Authorization: Basic $(printf 'admin:%s' "${SONAR_ADMIN_PASSWORD}" | base64 -w0)" \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}&type=USER_TOKEN" \
            | grep -o '"token":"[^"]*"' | cut -d'"' -f4)

          # Mask the token so it never appears in logs
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Install SonarScanner CLI
        run: |
          SCANNER_ZIP="sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip"
          SCANNER_DIR="$RUNNER_TEMP/sonar-scanner"
          curl -fsSL \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/${SCANNER_ZIP}" \
            -o "$RUNNER_TEMP/${SCANNER_ZIP}"
          rm -rf "$SCANNER_DIR"
          unzip -q "$RUNNER_TEMP/${SCANNER_ZIP}" -d "$SCANNER_DIR"
          echo "$SCANNER_DIR/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin" >> "$GITHUB_PATH"

      - name: SonarQube Scan
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ steps.sonar_setup.outputs.token }}
          SONAR_HOST_URL: http://localhost:9000
        run: sonar-scanner -Dsonar.projectBaseDir=.

      # Convert SonarQube issues to SARIF format.
      # The action waits for analysis processing to finish before fetching issues.
      - name: Convert to SARIF
        uses: ./ # Use local action for testing; in production use: vmvarela/sonarqube-sarif@v1
        with:
          sonar-host-url: http://localhost:9000
          sonar-token: ${{ steps.sonar_setup.outputs.token }}
          project-key: sonarqube-sarif
          output-file: sonarqube-results.sarif
          wait-for-processing: "true"

      # Upload SARIF to GitHub Code Scanning (push/dispatch only — not PRs)
      - name: Upload SARIF to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sonarqube-results.sarif
          category: sonarqube

      # Keep the SARIF file as a workflow artifact for inspection
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sarif-results
          path: sonarqube-results.sarif
