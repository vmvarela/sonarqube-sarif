name: Example - SonarQube to SARIF

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  sonarqube-analysis:
    name: SonarQube Analysis and SARIF Conversion
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      checks: write # Required for Check Run with annotations
      pull-requests: write # Required for PR comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      # Cache SonarQube scanner to avoid re-downloading JRE and plugins
      - name: Cache SonarQube Scanner
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: sonar-scanner-${{ runner.os }}

      # Run SonarQube analysis using SonarScanner CLI
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v7
        timeout-minutes: 10 # Fail fast if scanner hangs
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.projectName=${{ github.event.repository.name }}

      # Convert SonarQube issues to SARIF format
      # The action will automatically wait for analysis to complete
      - name: Convert to SARIF
        uses: ./ # Use local action for testing; in production use: vmvarela/sonarqube-sarif@v1
        with:
          sonar-host-url: ${{ secrets.SONAR_HOST_URL }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          project-key: ${{ github.event.repository.name }}
          output-file: "sonarqube-results.sarif"
          wait-for-processing: true # Set to false if token lacks "Execute Analysis" permission

      # Upload SARIF file to GitHub Code Scanning (only on push/dispatch to default branch)
      # In PRs, issues are shown via Check Run annotations and PR comments
      - name: Upload SARIF to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sonarqube-results.sarif
          category: sonarqube

      # Optional: Upload SARIF as artifact for review
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sarif-results
          path: sonarqube-results.sarif
