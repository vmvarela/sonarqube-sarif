name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Update major version tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update major version tag
        uses: actions/publish-action@v0.4.0
        with:
          source-tag: ${{ github.event.release.tag_name }}
