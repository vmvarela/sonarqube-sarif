name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: "🚀 Features"
    labels:
      - "type:feature"
    exclude-labels:
      - "type:bug"
      - "type:chore"
      - "type:docs"
      - "type:spike"
      - "tech-debt"
      - "dependencies"
  - title: "🐛 Bug Fixes"
    labels:
      - "type:bug"
    exclude-labels:
      - "type:feature"
      - "type:chore"
      - "type:docs"
      - "type:spike"
      - "tech-debt"
      - "dependencies"
  - title: "🧰 Maintenance"
    labels:
      - "type:chore"
      - "tech-debt"
    exclude-labels:
      - "type:feature"
      - "type:bug"
      - "type:docs"
      - "type:spike"
      - "dependencies"
  - title: "📝 Documentation"
    labels:
      - "type:docs"
    exclude-labels:
      - "type:feature"
      - "type:bug"
      - "type:chore"
      - "type:spike"
      - "tech-debt"
      - "dependencies"
  - title: "🔬 Spikes & Research"
    labels:
      - "type:spike"
    exclude-labels:
      - "type:feature"
      - "type:bug"
      - "type:chore"
      - "type:docs"
      - "tech-debt"
      - "dependencies"
  - title: "⬆️ Dependency Updates"
    labels:
      - "dependencies"
    exclude-labels:
      - "type:feature"
      - "type:bug"
      - "type:chore"
      - "type:docs"
      - "type:spike"
      - "tech-debt"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
autolabeler:
  - label: "type:feature"
    title:
      - '/^feat(\(.+\))?!?:/i'
  - label: "type:bug"
    title:
      - '/^fix(\(.+\))?!?:/i'
  - label: "type:docs"
    title:
      - '/^docs(\(.+\))?!?:/i'
  - label: "type:chore"
    title:
      - '/^(chore|refactor|test|build|ci|perf|style)(\(.+\))?!?:/i'
  - label: "type:spike"
    title:
      - '/^spike(\(.+\))?!?:/i'
  - label: "breaking"
    title:
      - '/^[a-z]+(\(.+\))?!:/i'
  - label: "dependencies"
    author:
      - "dependabot[bot]"
      - "dependabot-preview[bot]"
version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "type:feature"
  patch:
    labels:
      - "type:bug"
      - "type:chore"
      - "type:docs"
  default: patch
